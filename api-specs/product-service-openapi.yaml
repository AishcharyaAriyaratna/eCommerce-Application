openapi: 3.0.0
info:
  title: Product Service API
  description: Product catalog management with approval workflow for the eCommerce platform
  version: 1.0.0
  contact:
    name: eCommerce Platform Team
  license:
    name: MIT

servers:
  - url: http://localhost:8082
    description: Development server

paths:
  /api/products:
    get:
      summary: List all products
      description: Returns a list of all products in the catalog
      operationId: getAllProducts
      tags:
        - Products
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: List of products retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductDTO'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
    post:
      summary: Create a new product
      description: Creates a new product. Requires SUPPLIER role.
      operationId: createProduct
      tags:
        - Products
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProductRequest'
      responses:
        '201':
          description: Product created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductDTO'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /api/products/{id}:
    get:
      summary: Get product by ID
      description: Retrieves a specific product by its ID
      operationId: getProductById
      tags:
        - Products
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Product retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductDTO'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
    delete:
      summary: Delete product
      description: Deletes a product. Requires DATA_STEWARD role.
      operationId: deleteProduct
      tags:
        - Products
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Product deleted successfully
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /api/products/{id}/approve:
    post:
      summary: Approve product
      description: Approves a pending product for sale. Requires DATA_STEWARD role.
      operationId: approveProduct
      tags:
        - Approval
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Product approved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductDTO'
        '400':
          description: Product cannot be approved (invalid status)
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /api/products/{id}/reject:
    post:
      summary: Reject product
      description: Rejects a pending product. Requires DATA_STEWARD role.
      operationId: rejectProduct
      tags:
        - Approval
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  example: Does not meet quality standards
      responses:
        '200':
          description: Product rejected successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductDTO'
        '400':
          description: Product cannot be rejected (invalid status)
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /api/products/category/{category}:
    get:
      summary: Get products by category
      description: Returns all products in a specific category
      operationId: getProductsByCategory
      tags:
        - Products
      security:
        - BearerAuth: []
      parameters:
        - name: category
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Products retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductDTO'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /api/products/search:
    get:
      summary: Search products
      description: Searches for products by name
      operationId: searchProducts
      tags:
        - Products
      security:
        - BearerAuth: []
      parameters:
        - name: name
          in: query
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        '200':
          description: Search results retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductDTO'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /api/products/supplier/{supplierId}:
    get:
      summary: Get products by supplier
      description: Returns all products from a specific supplier
      operationId: getProductsBySupplier
      tags:
        - Products
      security:
        - BearerAuth: []
      parameters:
        - name: supplierId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Products retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductDTO'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /api/products/status/pending:
    get:
      summary: Get pending products
      description: Returns all products awaiting approval. Requires DATA_STEWARD role.
      operationId: getPendingProducts
      tags:
        - Products
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Pending products retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductDTO'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /api/products/{id}/stock:
    patch:
      summary: Update product stock
      description: Updates the stock quantity of a product. Requires SUPPLIER role.
      operationId: updateProductStock
      tags:
        - Products
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - quantity
              properties:
                quantity:
                  type: integer
                  minimum: 0
                  example: 100
      responses:
        '200':
          description: Stock updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductDTO'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'

components:
  schemas:
    ProductDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          example: Laptop Pro 15
        description:
          type: string
          example: High-performance laptop with 16GB RAM
        category:
          type: string
          example: Electronics
        price:
          type: number
          format: double
          example: 999.99
        stock:
          type: integer
          example: 50
        supplierId:
          type: integer
          format: int64
          example: 1
        status:
          type: string
          enum: [PENDING, APPROVED, REJECTED]
          example: APPROVED
        createdAt:
          type: string
          format: date-time
          example: 2026-04-16T12:00:00Z
        updatedAt:
          type: string
          format: date-time
          example: 2026-04-16T12:00:00Z

    CreateProductRequest:
      type: object
      required:
        - name
        - description
        - category
        - price
        - stock
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
          example: Laptop Pro 15
        description:
          type: string
          minLength: 1
          maxLength: 1000
          example: High-performance laptop with 16GB RAM
        category:
          type: string
          minLength: 1
          maxLength: 100
          example: Electronics
        price:
          type: number
          format: double
          minimum: 0
          example: 999.99
        stock:
          type: integer
          minimum: 0
          example: 50

    Error:
      type: object
      properties:
        message:
          type: string
        status:
          type: integer
        timestamp:
          type: string
          format: date-time

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT Bearer token from authentication service

  responses:
    UnauthorizedError:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    ForbiddenError:
      description: Access denied - insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    BadRequestError:
      description: Invalid request parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFoundError:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

tags:
  - name: Products
    description: Product catalog operations
  - name: Approval
    description: Product approval workflow
