openapi: 3.0.0
info:
  title: Order Service API
  description: Order management and fulfillment for the eCommerce platform
  version: 1.0.0
  contact:
    name: eCommerce Platform Team
  license:
    name: MIT

servers:
  - url: http://localhost:8083
    description: Development server

paths:
  /api/orders:
    get:
      summary: List all orders
      description: Returns a list of all orders in the system
      operationId: getAllOrders
      tags:
        - Orders
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: List of orders retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrderDTO'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
    post:
      summary: Create a new order
      description: Creates a new order. Requires CUSTOMER role.
      operationId: createOrder
      tags:
        - Orders
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
      responses:
        '201':
          description: Order created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderDTO'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /api/orders/{id}:
    get:
      summary: Get order by ID
      description: Retrieves a specific order by its ID
      operationId: getOrderById
      tags:
        - Orders
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Order retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderDTO'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
    delete:
      summary: Delete order
      description: Deletes an order. Requires DATA_STEWARD role.
      operationId: deleteOrder
      tags:
        - Orders
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Order deleted successfully
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /api/orders/{id}/confirm:
    patch:
      summary: Confirm order
      description: Confirms a pending order, locking items and quantities
      operationId: confirmOrder
      tags:
        - Order Workflow
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Order confirmed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderDTO'
        '400':
          description: Order cannot be confirmed (invalid status)
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /api/orders/{id}/ship:
    patch:
      summary: Ship order
      description: Marks order as shipped. Requires DATA_STEWARD role.
      operationId: shipOrder
      tags:
        - Order Workflow
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Order shipped successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderDTO'
        '400':
          description: Order cannot be shipped (invalid status)
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /api/orders/{id}/deliver:
    patch:
      summary: Deliver order
      description: Marks order as delivered. Requires DATA_STEWARD role.
      operationId: deliverOrder
      tags:
        - Order Workflow
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Order delivered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderDTO'
        '400':
          description: Order cannot be delivered (invalid status)
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /api/orders/{id}/cancel:
    patch:
      summary: Cancel order
      description: Cancels a pending order. Customer can cancel own orders, DATA_STEWARD can cancel any order.
      operationId: cancelOrder
      tags:
        - Order Workflow
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Order cancelled successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderDTO'
        '400':
          description: Order cannot be cancelled (invalid status)
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          description: Only order owner or administrators can cancel
        '404':
          $ref: '#/components/responses/NotFoundError'

  /api/orders/number/{orderNumber}:
    get:
      summary: Get order by order number
      description: Retrieves a specific order by its order number
      operationId: getOrderByNumber
      tags:
        - Orders
      security:
        - BearerAuth: []
      parameters:
        - name: orderNumber
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Order retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderDTO'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /api/orders/customer/{customerId}:
    get:
      summary: Get customer's orders
      description: Returns all orders for a specific customer
      operationId: getCustomerOrders
      tags:
        - Orders
      security:
        - BearerAuth: []
      parameters:
        - name: customerId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Customer orders retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrderDTO'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /api/orders/{id}/items:
    post:
      summary: Add items to order
      description: Adds items to a pending order
      operationId: addOrderItems
      tags:
        - Order Items
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/AddOrderItemRequest'
      responses:
        '201':
          description: Items added successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderDTO'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /api/orders/{orderId}/items/{itemId}:
    delete:
      summary: Remove item from order
      description: Removes an item from a pending order
      operationId: removeOrderItem
      tags:
        - Order Items
      security:
        - BearerAuth: []
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Item removed successfully
        '400':
          description: Item cannot be removed from confirmed order
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'

components:
  schemas:
    OrderDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        orderNumber:
          type: string
          example: ORD-2026-001
        customerId:
          type: integer
          format: int64
          example: 1
        status:
          type: string
          enum: [PENDING, CONFIRMED, SHIPPED, DELIVERED, CANCELLED]
          example: CONFIRMED
        totalAmount:
          type: number
          format: double
          example: 2999.97
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItemDTO'
        createdAt:
          type: string
          format: date-time
          example: 2026-04-16T12:00:00Z
        updatedAt:
          type: string
          format: date-time
          example: 2026-04-16T12:00:00Z

    OrderItemDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        orderId:
          type: integer
          format: int64
          example: 1
        productId:
          type: integer
          format: int64
          example: 1
        quantity:
          type: integer
          example: 2
        unitPrice:
          type: number
          format: double
          example: 999.99
        subtotal:
          type: number
          format: double
          example: 1999.98

    CreateOrderRequest:
      type: object
      required:
        - customerId
      properties:
        customerId:
          type: integer
          format: int64
          example: 1

    AddOrderItemRequest:
      type: object
      required:
        - productId
        - quantity
      properties:
        productId:
          type: integer
          format: int64
          example: 1
        quantity:
          type: integer
          minimum: 1
          example: 2

    Error:
      type: object
      properties:
        message:
          type: string
        status:
          type: integer
        timestamp:
          type: string
          format: date-time

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT Bearer token from authentication service

  responses:
    UnauthorizedError:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    ForbiddenError:
      description: Access denied - insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    BadRequestError:
      description: Invalid request parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFoundError:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

tags:
  - name: Orders
    description: Order management operations
  - name: Order Workflow
    description: Order status transition operations
  - name: Order Items
    description: Order item management
